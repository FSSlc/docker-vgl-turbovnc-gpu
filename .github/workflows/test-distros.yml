name: Test All Distributions

on:
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # 每周一凌晨 2 点运行
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu2404
          - ubuntu2204
          - debian13
          - debian12
          - rocky9
          - rocky8
          - alma9
          - alma8
          - fedora40
          - fedora39
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_DISTRO=${{ matrix.distro }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: vgl-test:${{ matrix.distro }}
          cache-from: type=gha,scope=${{ matrix.distro }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}

      - name: Test VirtualGL (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg BASE_DISTRO=${{ matrix.distro }} \
            --load \
            -t vgl-test:${{ matrix.distro }}-amd64 .
          docker run --rm --platform linux/amd64 vgl-test:${{ matrix.distro }}-amd64 \
            /opt/VirtualGL/bin/vglrun --version

      - name: Test TurboVNC (amd64)
        run: |
          docker run --rm --platform linux/amd64 vgl-test:${{ matrix.distro }}-amd64 \
            /opt/TurboVNC/bin/Xvnc -version

      - name: Test entrypoint (amd64)
        run: |
          docker run --rm --platform linux/amd64 \
            -e VNC_PASSWORD=testpass123 \
            vgl-test:${{ matrix.distro }}-amd64 \
            /bin/bash -c 'echo "Entrypoint test passed"'

      - name: Test VirtualGL (arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BASE_DISTRO=${{ matrix.distro }} \
            --load \
            -t vgl-test:${{ matrix.distro }}-arm64 .
          docker run --rm --platform linux/arm64 vgl-test:${{ matrix.distro }}-arm64 \
            /opt/VirtualGL/bin/vglrun --version

      - name: Test TurboVNC (arm64)
        run: |
          docker run --rm --platform linux/arm64 vgl-test:${{ matrix.distro }}-arm64 \
            /opt/TurboVNC/bin/Xvnc -version

      - name: Test entrypoint (arm64)
        run: |
          docker run --rm --platform linux/arm64 \
            -e VNC_PASSWORD=testpass123 \
            vgl-test:${{ matrix.distro }}-arm64 \
            /bin/bash -c 'echo "Entrypoint test passed"'

  summary:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "✅ All distributions tested successfully!"
          else
            echo "❌ Some tests failed"
            exit 1
          fi
